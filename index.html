<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
      <h1>Sign Up</h1>
      <form action="signupFrom">
        <div class="input-box">
          <input type="text" id="name" placeholder="FullName" required />
        </div>
        <div class="input-box">
          <input type="email" id="email" placeholder="Email Address" required />
        </div>
        <div class="input-box">
          <input
            type="password"
            id="password"
            placeholder="Enter Your password"
            required
          />
        </div>

        <button type="submit" id="btn">Create Account</button>
        <div class="message" id="messsage">Account created successfully</div>

        <div class="login-link">
          Already have an account?
          <a href="#">LogIn</a>
        </div>
      </form>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
